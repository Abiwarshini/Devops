services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - MONGO_URI=mongodb://db:27017/eventdb

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  db:
    image: mongo
    ports:
      - "27018:27017"   # 🔥 changed port here
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
